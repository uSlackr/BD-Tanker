esphome:
  name: "brew-control"
  friendly_name: BC-2

packages:
  site_settings: !include site-setting.yaml

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "ITD6Ax+F/Y2UgRH+IYwUThyo0KNBhO8x9wuJjF3SPRM="

ota:
  - platform: esphome
    password: "712e7b92a884be9a0c537de849d8f876"

# wifi:
#   ssid: !secret wifi_ssid
#   password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  # ap:
  #   ssid: "brew-control Fallback Hotspot"
  #   password: "QNq5T7Duj7ql"
ethernet:
  type: W5500
  clk_pin: GPIO1
  mosi_pin: GPIO2
  miso_pin: GPIO41
  cs_pin: GPIO42
  interrupt_pin: GPIO43
  reset_pin: GPIO44
#captive_portal:
web_server:
  version: 3

button:
  - platform: restart
    name: "Restart"

i2c:
   - id: bus_a
     sda: 8
     scl: 18
     scan: true
     frequency: 400kHz
################################################
one_wire:
  - platform: gpio
  # Serial expansion RX
    pin: 47
    id: one_wire_1
  #note: pull-up resistor on board!
################################################
udp:
packet_transport:
  id: pt_1
  platform: udp
  update_interval: 5s
  providers:
    - name: bd-remote-a
      encryption: !secret bd_udp_enc
    - name: bd-remote-b
      encryption: !secret bd_udp_enc
    - name: bd-remote-c
      encryption: !secret bd_udp_enc

################################################
font:
  - file: "gfonts://Roboto"
    id: roboto_20
    size: 20
  - file: "gfonts://Roboto"
    id: roboto_14
    size: 14

display:
  - platform: ssd1306_i2c
    i2c_id: bus_a
    model: "SSD1306 128x64"
    rotation: 180
    address: 0x3C
    lambda: |-
      it.printf(0, 0, id(roboto_20), "BruDaddy");
      it.printf(0, 45, id(roboto_14), "BGS Tanker");

#########################################################
pcf8574:
  - id: 'pcf8574_hub_in_1'  # for input channel 1-16
    i2c_id: bus_a
    address: 0x22
    pcf8575: true

  - id: 'pcf8574_hub_in_out_1'  # for digital input channel 17-24 & ouptut 1-8
    i2c_id: bus_a
    address: 0x25
    pcf8575: true

  - id: 'pcf8574_hub_out_1'  # for output channel 9-24
    i2c_id: bus_a
    address: 0x24
    pcf8575: true

binary_sensor:
  - platform: gpio
    name: "BruDaddy 24V Power Fault"
    id: brudaddy_24v_power_fault
    device_class: problem
    pin:
      number: GPIO48
      mode:
        input: true
        pullup: true
      inverted: false

