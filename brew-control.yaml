  - platform: dallas_temp
    one_wire_id: one_wire_1
    #address: 0x47000000be756828
    address: 0xd6000000ba10c828
    name: "Enclosure Temp"
    id: enclosure_temp
    update_interval: 5.0s
    unit_of_measurement: '°C'
    filters:
      - median:
          window_size: 3
          send_every: 2
          send_first_at: 2
      - round: 1

climate:
  - platform: thermostat
    name: "${tank_a1_name} Ctrl"
    id: tank_a1_ctrl
    visual:
      min_temperature: 30 °F
      max_temperature: 180 °F
      temperature_step: .1 °F
    sensor: ${tank_a1_sensor_id}
    min_cooling_off_time: 60s
    min_cooling_run_time: 30s
    min_idle_time: 60s
    cool_deadband: 0.2
    cool_overrun: 0.0
    cool_action:
      - switch.turn_on: ${tank_a1_valve_id}
    idle_action:
      - switch.turn_off: ${tank_a1_valve_id}
    default_preset: "off"
    preset:
      - name: ferment (65)
        default_target_temperature_high: 65 °F
        mode: cool
      - name: crash
        default_target_temperature_high: 35 °F
        mode: cool
      - name: clean
        default_target_temperature_high: 180 °F
        mode: cool
      - name: "off"
        default_target_temperature_high: 70 °F
        mode: "OFF"

  - platform: thermostat
